name: Agentic Quality Gate

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

jobs:
  validate-agent-code:
    name: Code Quality & Type Enforcement
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: TypeScript Type Checking (vue-tsc)
      run: npm run typecheck
      # Enforces that all code generated by the agent is type-safe and has no TS errors

    - name: ESLint Validation
      run: npm run lint
      # Ensures adherence to basic syntax styles

    - name: BM Architecture Checks
      run: |
        echo "Validating 'Zero HTML Button' policy in views..."
        PROHIBITED_TAGS=$(grep -rnE "<button" src/views/ --include="*.vue" | grep -v "\-\-ignore" || true)
        if [ ! -z "$PROHIBITED_TAGS" ]; then
          echo "ERROR: Found raw <button> tags in views. Agents MUST use <AppButton>. Please fix the following files:"
          echo "$PROHIBITED_TAGS"
          exit 1
        fi
        echo "✅ HTML policy validated."

        echo "Validating static class pattern in API services..."
        NON_STATIC=$(grep -rnE "export default " src/services/api/services/ --include="*.ts" || true)
        if [ ! -z "$NON_STATIC" ]; then
          echo "ERROR: Found default exports in API services. Agents MUST use static class pattern."
          echo "$NON_STATIC"
          exit 1
        fi
        echo "✅ API pattern validated."
